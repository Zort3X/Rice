################
### MONITORS ###
################
monitor = DP-1, 2560x1440@200, 0x0, auto

#################
### AUTOSTART ###
#################
exec-once = waybar & hyprpaper & mako & hypridle & hyprctl setcursor Bibata-Modern-Classic 24 & wl-paste --type text --watch cliphist store & wl-paste --type image --watch cliphist store

#############
### INPUT ###
#############
input {
    kb_layout = us,bg
    kb_variant = ,phonetic
    kb_options = grp:alt_shift_toggle
    follow_mouse = 1
    sensitivity = 0

    touchpad {
        natural_scroll = false
    }
}

#####################
### LOOK AND FEEL ###
#####################
general {
    gaps_in = 4
    gaps_out = 8
    border_size = 2
    col.active_border = rgb(b8bb26)
    col.inactive_border = rgb(373533)
    resize_on_border = true
    allow_tearing = false
    layout = dwindle
}

decoration {
    rounding = 12
    active_opacity = 1.0
    inactive_opacity = 0.94

    shadow {
        enabled = true
        range = 10
        render_power = 3
        color = rgba(00000044)
    }

    blur {
        enabled = true
        size = 5
        passes = 2
        vibrancy = 0.1696
    }
}

animations {
    enabled = yes
    bezier = myBezier, 0.05, 0.9, 0.1, 1.05
    animation = windows, 1, 5, myBezier
    animation = windowsOut, 1, 5, default, popin 80%
    animation = border, 1, 10, default
    animation = fade, 1, 5, default
    animation = workspaces, 1, 5, default
}

dwindle {
    pseudotile = true
    preserve_split = true
}

master {
    new_status = master
}

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
}

###################
### KEYBINDINGS ###
###################
bind = SUPER, Return, exec, alacritty
bind = SUPER, D, exec, rofi -show drun -theme $HOME/.config/rofi/style.rasi
bind = SUPER, X, exec, $HOME/.config/rofi/powermenu.sh
bind = SUPER SHIFT, D, exec, rofi -show run -theme $HOME/.config/rofi/style.rasi
bind = SUPER, TAB, exec, rofi -show window -theme $HOME/.config/rofi/style.rasi
bind = SUPER SHIFT, Q, killactive,
bind = SUPER SHIFT, E, exit,
bind = SUPER, R, togglesplit,
bind = SUPER, F, fullscreen

# Window Focus
bind = SUPER, left, movefocus, l
bind = SUPER, right, movefocus, r
bind = SUPER, up, movefocus, u
bind = SUPER, down, movefocus, d

# Move Window
bind = SUPER SHIFT, left, movewindow, l
bind = SUPER SHIFT, right, movewindow, r
bind = SUPER SHIFT, up, movewindow, u
bind = SUPER SHIFT, down, movewindow, d
bindm = SUPER, mouse:272, movewindow

# Resize Window
bind = CONTROL ALT, left, resizeactive, -25 0
bind = CONTROL ALT, right, resizeactive, 25 0
bind = CONTROL ALT, up, resizeactive, 0 -25
bind = CONTROL ALT, down, resizeactive, 0 25
bindm = SUPER, mouse:273, resizewindow

# Workspaces
bind = SUPER, 1, workspace, 1
bind = SUPER, 2, workspace, 2
bind = SUPER, 3, workspace, 3
bind = SUPER, 4, workspace, 4
bind = SUPER, 5, workspace, 5
bind = SUPER, 6, workspace, 6
bind = SUPER, 7, workspace, 7
bind = SUPER, 8, workspace, 8
bind = SUPER, 9, workspace, 9
bind = SUPER, 0, workspace, 10

# Move to Workspace
bind = SUPER SHIFT, 1, movetoworkspace, 1
bind = SUPER SHIFT, 2, movetoworkspace, 2
bind = SUPER SHIFT, 3, movetoworkspace, 3
bind = SUPER SHIFT, 4, movetoworkspace, 4
bind = SUPER SHIFT, 5, movetoworkspace, 5
bind = SUPER SHIFT, 6, movetoworkspace, 6
bind = SUPER SHIFT, 7, movetoworkspace, 7
bind = SUPER SHIFT, 8, movetoworkspace, 8
bind = SUPER SHIFT, 9, movetoworkspace, 9
bind = SUPER SHIFT, 0, movetoworkspace, 10

# Special Workspace
bind = SUPER, GRAVE, togglespecialworkspace, magic
bind = SUPER SHIFT, GRAVE, movetoworkspace, special:magic

# Screenshot
bind = SUPER SHIFT, S, exec, hyprshot -m region --clipboard-only
bind = SUPER, PRINT, exec, hyprshot -m output --clipboard-only
bind = SUPER SHIFT, PRINT, exec, hyprshot -m window --clipboard-only
bind = ALT SHIFT, S, exec, hyprshot -m region
bind = ALT, PRINT, exec, hyprshot -m
bind = ALT SHIFT, PRINT, exec, hyprshot -m window

# Audio
bindle = , XF86AudioRaiseVolume, exec, wpctl set-volume -l 1.0 @DEFAULT_AUDIO_SINK@ 5%+
bindle = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindl  = , XF86AudioMute,        exec, wpctl set-mute   @DEFAULT_AUDIO_SINK@ toggle
bindle = SUPER, XF86AudioRaiseVolume, exec, wpctl set-volume -l 1.0 @DEFAULT_AUDIO_SOURCE@ 5%+
bindle = SUPER, XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SOURCE@ 5%-
bindl  = SUPER, XF86AudioMute,        exec, wpctl set-mute   @DEFAULT_AUDIO_SOURCE@ toggle
