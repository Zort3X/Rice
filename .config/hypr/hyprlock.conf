general {
    no_fade_in = false
    grace = 0
    disable_loading = true
}

background {
    monitor =
    path = screenshot
    color = rgba(40, 40, 40, 1.0)
    blur_passes = 2
    contrast = 0.8916
    brightness = 0.8172
    vibrancy = 0.1696
    vibrancy_darkness = 0.0
}

input-field {
    monitor =
    size = 250, 60
    outline_thickness = 2
    dots_size = 0.2
    dots_spacing = 0.2
    dots_center = true
    outer_color = rgba(184, 187, 38, 1.0)
    inner_color = rgba(40, 40, 40, 0.4)
    font_color = rgba(235, 219, 178, 1.0)
    font_family = ProFont IIx Nerd Font
    fade_on_empty = false
    placeholder_text = <span foreground="##ebdbb2">Password...</span>
    hide_input = false
    position = 0, -120
    halign = center
    valign = center
}

label {
    monitor =
    text = $TIME
    color = rgba(184, 187, 38, 1.0)
    font_size = 120
    font_family = ProFont IIx Nerd Font Bold
    position = 0, 80
    halign = center
    valign = center
}

label {
    monitor =
    text = Hi there, $USER
    color = rgba(235, 219, 178, 1.0)
    font_size = 25
    font_family = ProFont IIx Nerd Font Bold
    position = 0, -40
    halign = center
    valign = center
}
