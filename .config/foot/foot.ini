# Foot Terminal - Surgical Gruvbox Config
# Matches Alacritty exactly for a unified aesthetic.

# Font size updated to 15
font=ProFont IIx Nerd Font:size=15:style=Bold

[main]
pad=12x12
initial-window-size-chars=80x24

[colors-dark]
alpha=0.92
background=282828
foreground=ebdbb2

## Normal colors
regular0=282828  # black
regular1=fb4934  # red
regular2=b8bb26  # green
regular3=fabd2f  # yellow
regular4=83a598  # blue
regular5=d3869b  # magenta
regular6=8ec07c  # cyan
regular7=ebdbb2  # white

## Bright colors
bright0=928374   # bright black
bright1=fb4934   # bright red
bright2=b8bb26   # bright green
bright3=fabd2f   # bright yellow
bright4=83a598   # bright blue
bright5=d3869b   # bright magenta
bright6=8ec07c   # bright cyan
bright7=ebdbb2   # bright white

## Misc colors
selection-foreground=ebdbb2
selection-background=3c3836
urls=83a598

[cursor]
style=block
blink=no
# Removed manual 'color' key to fix error. 
# Foot will default to inverting background/foreground for the cursor.

[mouse]
hide-when-typing=yes

[key-bindings]
# Match Alacritty's Copy/Paste
# (Default in foot is Control+Shift+C/V)
# spawn-terminal=Control+Shift+n
# copy-to-clipboard=Control+Shift+c
# paste-from-clipboard=Control+Shift+v
